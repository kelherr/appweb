<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>{% block title %} Estadísticas {% endblock %}</title>
    {% block css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/inicio.css') }}">
    {% endblock %}
  </head>
  
  {% block content %} 
  <body>
    {% include 'navbar.html' %}
    <div class="chart-container">
      <figure class="highcharts-figure">
          <div id="chart-donacion"></div>
          <div id="chart-pedido"></div>
      </figure>
    </div>
    <div class="volver-inicio">
      <a class="back" href="{{url_for('inicio')}}">Volver</a>
    </div>
    {% block javascript %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>
    <script src="{{url_for('static', filename='js/highcharts.js')}}"></script>
    <script src="{{url_for('static', filename='js/datos.js')}}"></script>
    {% endblock %}
  </body>
  {% endblock %}
</html>
