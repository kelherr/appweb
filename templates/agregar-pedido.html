<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Agregar Pedido</title>
    <link rel="stylesheet" type="text/css" href="../css/formularios.css">
  </head>
<body class="box">
  <div class="main-container">
    <div id="val-box" class="val" hidden>
      <h2 id="val-msg">_</h2>
      <u1 id="val-list"></u1>
    </div>
    <form id="login-form" class="formulario">
      <h3>Datos Solicitante</h3>
      <div id="nombre-input" class="grupo-input">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" size="80" required>
      </div>
      <div id="email-input" class="grupo-input">
        <label for="email">Email</label>
        <input id="email" name="email" type="text" size="30" required>
      </div>
      <div id="celular-input" class="grupo-input">
        <label for="celular">Teléfono celular</label>
        <input id="celular" name="celular" type="text" size="15">
      </div>
      <h3>Dirección</h3>
      <div class="grupo-input">
        <label for="region">Región</label>
        <select id="region" name="region">
          <option value="" selected="selected">--</option>
        </select>
      </div>
      <div class="grupo-input">
        <label for="comuna">Comuna</label>
        <select id="comuna" name="comuna">
          <option value="" selected="selected">--</option>
        </select>
      </div> 
      <div id="calle-numero-input" class="grupo-input">
        <label for="calle-numero">Calle y Número</label>
        <input id="calle-numero" name="calle-numero" type="text" size="80" required>
      </div>
      <h3>Datos Pedido</h3>
      <div id="tipo-input" class="grupo-input">
        <label for="tipo">Tipo de Pedido</label>
        <select name="tipo" id="tipo">
          <option value="fruta">Fruta</option>
          <option value="verdura">Verdura</option>
          <option value="otros">Otro</option>
        </select>
      </div>
      <div id="descripcion-input" class="grupo-input">
        <label for="descripcion">Descripción</label>
        <input id="descripcion" name="descripcion" type="text" size="80">
      </div>
      <div id="cantidad-input" class="grupo-input">
        <label for="cantidad">Cantidad</label>
        <input id="cantidad" name="cantidad" type="text" size="10" required>
      </div>
      <div class="boton">
        <button class="enviar" type="button" id="envio">Agregar Pedido</button>
      </div>
      <div class="btn-conf" id="confirmar" hidden>
        <p id="msg">¿Confirma que desea agregar este pedido?</p>
        <button id="no" class="enviar">No, quiero volver al formulario</button>
        <button id="si" class="enviar" type="submit">Si, confirmo</button>
        <button id="volver" class="enviar" onclick="irInicio()" hidden>Volver al inicio</button>
      </div>
    </form>
  </div>  
  <script src="../js/regiones-comunas.js"></script>
  <script src="../js/validacion-pedido.js"></script> 
</body>
</html>
