<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Agregar Pedido{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.css') }}">
  </head>

  {% block content %}
  <body>
  {% include 'navbar.html' %}

    <div class="container mt-4 mb-5">
      <h2 class="mb-4">Agregar Pedido</h2>
      <form id="login-form" method="post">
        <h5 class="mt-4">Datos Solicitante</h5>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Nombre</label>
            <input class="form-control" id="nombre" name="nombre" type="text" placeholder="Juan Pérez">
          </div>
          <div class="col-md-4">
            <label class="form-label">Email</label>
            <input class="form-control" id="email" name="email" type="text" placeholder="ejemplo@mail.com">
          </div>
          <div class="col-md-4">
            <label class="form-label">Celular</label>
            <input class="form-control" id="celular" name="celular" type="text" placeholder="912345678">
          </div>
        </div>

        <h5 class="mt-4">Dirección</h5>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Región</label>
            <select class="form-select" id="region" name="region">
              <option value="">--</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Comuna</label>
            <select class="form-select" id="comuna" name="comuna">
              <option value="">--</option>
            </select>
          </div>
        </div>

        <h5 class="mt-4">Datos Pedido</h5>
        <div class="row mb-3">
          <div class="col-md-3">
            <label class="form-label">Tipo</label>
            <select class="form-select" id="tipo" name="tipo">
              <option value="">--</option>
              <option value="fruta">Fruta</option>
              <option value="verdura">Verdura</option>
              <option value="otros">Otro</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Cantidad</label>
            <input class="form-control" id="cantidad" name="cantidad" type="text" placeholder="20 kg">
          </div>
          <div class="col-md-6">
            <label class="form-label">Descripción</label>
            <input class="form-control" id="descripcion" name="descripcion" type="text">
          </div>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary" type="button" id="envio">
            Agregar Pedido
          </button>
        </div>
      </form>
    </div>

    {% block scripts %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script lang="javascript" src="{{ url_for('static', filename='js/regiones-comunas.js') }}"></script>
    <script src="{{ url_for('static', filename='js/validacion-pedido.js') }}"></script>
    {% endblock %}
  </body>
  {% endblock content %}
</html>
