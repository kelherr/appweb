<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>{% block title %} Estadísticas {% endblock %}</title>
    {% block css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/inicio.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/dashboard.css') }}">
    {% endblock %}
  </head>
  {% block content %}
  <body>
  {% include 'navbar.html' %}
  <div class="container mt-4 mb-5">
    <div class="row mb-3">
      <div class="col-md-3">
        <div class="card">
          <div class="card-header" style="background-color: #AE759F">
            Donaciones Totales
          </div>
          <ul class="list-group list-group-flush" style="background-color: whitesmoke;">
            <li class="list-group-item">21</li>
          </ul>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card">
          <div class="card-header" style="background-color: #AE759F">
            Pedidos Totales
          </div>
          <ul class="list-group list-group-flush" style="background-color: whitesmoke;">
            <li class="list-group-item">5</li>
          </ul>
        </div>
      </div>
      <div class="col-md-6">
        <div class="chart-container">
          <figure class="highcharts-figure">
            <div id="container"></div>
          </figure>
        </div> 
      </div>
    </div> 
  </div>
  </body>
  {% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/highcharts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/grafico-apilado.js') }}"></script>
  {% endblock %}
  {% endblock content %}
</html>
